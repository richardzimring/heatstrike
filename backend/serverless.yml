org: rgzimring
app: heatstrike
service: heatstrike

plugins:
  - serverless-offline
#   - serverless-api-gateway-throttling

# custom:
#   apiGatewayThrottling:
#     maxRequestsPerSecond: 50
#     maxConcurrentRequests: 100

provider:
  name: aws
  runtime: nodejs24.x
  region: us-east-1
  httpApi:
    cors: true
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: 7
  versionFunctions: false
  domain:
    name: api.heatstrike.rzimring.com
    certificateArn: arn:aws:acm:us-east-1:496673558463:certificate/a7d513f0-049a-48b2-a544-c7f89fa6fdcc
    createRoute53Record: false
    apiType: http
    endpointType: regional
  environment:
    OPTIONS_TABLE_NAME:
      Ref: OptionsTable
    TICKERS_BUCKET_NAME:
      Ref: TickersBucket
    TRADIER_KEY: ${env:TRADIER_KEY}
    BUG_REPORT_EMAIL: ${env:BUG_REPORT_EMAIL}
    FMP_API_KEY: ${env:FMP_API_KEY, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - Fn::GetAtt: [OptionsTable, Arn]
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: '*'
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - Fn::Join:
                - ''
                - - Fn::GetAtt: [TickersBucket, Arn]
                  - '/*'

functions:
  OptionsAPI:
    handler: lambdas/api.handler
    name: ${self:provider.stage}-${self:service}-options-api
    memorySize: 256
    timeout: 29
    events:
      - httpApi:
          path: /data/{ticker}
          method: GET
      - httpApi:
          path: /market/quotes
          method: GET
      - httpApi:
          path: /openapi.json
          method: GET
      - httpApi:
          path: /feedback
          method: POST
      - httpApi:
          path: /tickers
          method: GET

  WarmDefaultQuotes:
    handler: lambdas/warmDefaultQuotes.handler
    name: ${self:provider.stage}-${self:service}-warm-default-quotes
    memorySize: 256
    timeout: 15
    events:
      - schedule: rate(5 minutes)

  RefreshTickers:
    handler: lambdas/refreshTickers.handler
    name: ${self:provider.stage}-${self:service}-refresh-tickers
    memorySize: 256
    timeout: 30
    events:
      - schedule: rate(1 day)

resources:
  Resources:
    OptionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: ticker
            AttributeType: S
        KeySchema:
          - AttributeName: ticker
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TableName: ${self:provider.stage}-${self:service}-options-table
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    TickersBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.stage}-${self:service}-${self:provider.region}-tickers
